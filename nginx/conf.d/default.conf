# ── HTTP: ACME challenge + HTTPS 리다이렉트 ──────────────────────
server {
    listen 80;
    server_name urlcut.kr;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name urlcut.kr;

    ssl_certificate     /etc/letsencrypt/live/urlcut.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/urlcut.kr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /usr/share/nginx/html;

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # Vite 빌드 정적 파일 캐시 (콘텐츠 해시 포함이므로 장기 캐시 안전)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 루트 진입점
    location = / {
        try_files /index.html =404;
    }

    # 정적 파일이 존재하면 직접 서빙, 없으면 BE로 프록시
    # /auth/*, /short-urls*, /me, /urls/*, /{slug} 모두 처리
    location / {
        try_files $uri @backend;
    }

    location @backend {
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }
}
