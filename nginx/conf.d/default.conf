# ── HTTP: ACME challenge + HTTPS 리다이렉트 ──────────────────────
server {
    listen 80;
    server_name urlcut.kr;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

